        <h1>Smart Feeder</h1>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>


<script>
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-icon').textContent = isDark ? '☾' : '☀';
    updateChartTheme();
  }


  let alertDismissed = false;


  function showAlert(msg) {
    if (alertDismissed) return;
    document.getElementById('alert-text').textContent = msg;
    document.getElementById('alert-banner').classList.add('show');
  }


  function hideAlert() {
    document.getElementById('alert-banner').classList.remove('show');
  }


  function dismissAlert() {
    alertDismissed = true;
    hideAlert();
  }


  function badge(text, type) {
    return `<span class="badge badge-${type}">${text}</span>`;
  }


  function statusBadge(s) {
    s = (s || '').toUpperCase();
    if (s === 'OPEN') return badge(s, 'open');
    if (s === 'CLOSED' || s === 'CLOSE') return badge('CLOSED', 'closed');
    if (s === 'AUTO') return badge('AUTO', 'auto');
    return badge(s, 'idle');
  }


  function methodBadge(m) {
    return badge(m, m === 'MANUAL' ? 'manual' : 'auto');
  }


  function setStepperButtons(mode) {
    ['open','close','auto'].forEach(m => {
      document.getElementById(`s-${m}`).className =
        'btn' + (m === mode ? ` active-${m}` : '');
    });
  }


  function setVibButtons(mode) {
    ['on','off','auto'].forEach(m => {
      document.getElementById(`v-${m}`).className =
        'btn' + (m === mode ? ` active-${m}` : '');
    });
  }


  function updateCardStyle(id, cls) {
    document.getElementById(id).className = 'card ' + (cls || '');
  }


  function pushToChart(chart, label, value, max = 40) {
    chart.data.labels.push(label);
    chart.data.datasets[0].data.push(value);


    if (chart.data.labels.length > max) {
      chart.data.labels.shift();
      chart.data.datasets[0].data.shift();
    }
    chart.update();
  }
</script>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, onSnapshot,
  collection, query, orderBy, limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


import {
  getDatabase, ref, set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyBmxZwbP7G0JBw016J4EJvcEVoGhBF2COg",
  authDomain: "petfeeder-661f6.firebaseapp.com",
  projectId: "petfeeder-661f6",
  storageBucket: "petfeeder-661f6.firebasestorage.app",
  messagingSenderId: "841780628794",
  appId: "1:841780628794:web:cd8e963a1b1c82ec109403"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const rtdb = getDatabase(app);


/* ✅ CONTROL (FIXED) */
function setStepper(mode) {
  setStepperButtons(mode);
  set(ref(rtdb, "control/stepper"), mode.toUpperCase());
}


function setVibration(mode) {
  setVibButtons(mode);
  set(ref(rtdb, "control/vibration"), mode.toUpperCase());
}


window.setStepper = setStepper;
window.setVibration = setVibration;


/* FIRESTORE SENSOR */
onSnapshot(doc(db, "feeder", "sensor_state"), (snap) => {
  if (!snap.exists()) return;


  const d = snap.data();
  const dist = parseFloat(d.distance);
  const weight = parseFloat(d.weight);
  const now = new Date().toLocaleTimeString();


  document.getElementById('distance').innerHTML =
    (dist < 0 ? '--' : dist.toFixed(1)) + '<span class="unit">cm</span>';


  document.getElementById('weight-val').innerHTML =
    (isNaN(weight) ? '--' : weight.toFixed(1)) + '<span class="unit">g</span>';


  document.getElementById('status').textContent = d.status || '--';
  document.getElementById('vibration').textContent = d.vibration || '--';


  updateCardStyle('card-distance', dist > 0 && dist < 15 ? 'active' : '');
  updateCardStyle('card-weight', weight >= 15 ? 'alert' : '');


  if (dist >= 0) pushToChart(distChart, now, dist);
  if (!isNaN(weight)) pushToChart(weightChart, now, weight);
});


/* HISTORY */
const historyQuery = query(
  collection(db, "feed_history"),
  orderBy("timestamp", "desc"),
  limit(100)
);


onSnapshot(historyQuery, (snap) => {
  const data = snap.docs.map(d => d.data());


  document.getElementById('history-count').textContent =
    `${data.length} entries`;


  document.getElementById('history').innerHTML =
    data.map(r => `
      <tr>
        <td>${r.time}</td>
        <td>${methodBadge(r.method)}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${r.distance}</td>
        <td>${r.weight}</td>
        <td>${r.vibration}</td>
      </tr>
    `).join('');
});
</script>
